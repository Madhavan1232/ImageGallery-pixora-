<svg width="100%" height="100%" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" id="pixora-gold-portal-svg">
    <defs>
        <!-- Liquid Brass & Glassmorphism Gradients -->
        <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe259" stop-opacity="0.75"></stop>
            <stop offset="45%" stop-color="#ffa751" stop-opacity="0.2"></stop>
            <stop offset="100%" stop-color="#ffe259" stop-opacity="0.5"></stop>
        </linearGradient>
        <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe259" stop-opacity="0.12"></stop>
            <stop offset="100%" stop-color="#ffe259" stop-opacity="0.02"></stop>
        </linearGradient>
        <linearGradient id="specularCore" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffe259"></stop>
            <stop offset="50%" stop-color="#ffa751"></stop>
            <stop offset="100%" stop-color="#1a0f00"></stop>
        </linearGradient>
    </defs>

    <!-- Overlapping Glass Portal Structure -->
    <g transform="translate(92, 92) scale(3.32)">
        <g transform="translate(0, 5)">
            <!-- Base structural glass plate (Behind) -->
            <rect x="25" y="20" width="50" height="60" rx="8" fill="url(#glassFill)" stroke="url(#glassBorder)" stroke-width="1.2"></rect>
            
            <!-- High-contrast Solid Gold Shard -->
            <polygon points="28,25 55,40 28,68" fill="url(#specularCore)" stroke="#000000" stroke-width="0.5"></polygon>
            
            <!-- Viewport Overlay Glass Frame (In-Front) -->
            <path d="M48,32 L72,32 C75.3,32 78,34.7 78,38 L78,62 C78,65.3 75.3,68 72,68 L48,68 C44.7,68 42,65.3 42,62 L42,38 C42,34.7 44.7,32 48,32 Z" fill="url(#glassFill)" stroke="url(#glassBorder)" stroke-width="1.5"></path>
            
            <!-- Focal Aperture Element (Bright gold camera dot) -->
            <circle cx="68" cy="42" r="2.5" fill="#ffe259"></circle>
        </g>
    </g>
</svg>